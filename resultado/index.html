<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

:root{
--bg:#FCF3EC;
--orange:#FF5E29;
--green:#00804A;
--pink:#FFB6EF;
--yellow:#FFD12E;
--burgundy:#4E080C;
--white:#fff;
--ink:#000;
--muted:#65605c;
--shadow:0 18px 50px rgba(0,0,0,.08);
--shadow-soft:0 10px 30px rgba(0,0,0,.06);
}

*{box-sizing:border-box}

body{
margin:0;
color:var(--ink);
font-family:Inter,sans-serif;
padding:22px 14px 40px;

background:
radial-gradient(circle at top right, rgba(255,182,239,.42), transparent 30%),
radial-gradient(circle at bottom left, rgba(255,209,46,.28), transparent 28%),
var(--bg);
}

.shell{
max-width:540px;
margin:auto;
}

.hidden{
display:none!important;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:18px;
}

.top-left{
display:flex;
gap:10px;
align-items:center;
}

.logo{
width:52px;
height:52px;
border-radius:18px;
background:var(--orange);
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:24px;
font-weight:800;
box-shadow:var(--shadow-soft);
}

.brand-title{
font-family:"Baloo 2", cursive;
font-size:30px;
font-weight:800;
line-height:1;
}

.brand-sub{
color:#6a6663;
font-size:13px;
font-weight:700;
margin-top:4px;
}

.badge{
background:var(--pink);
color:var(--burgundy);
padding:9px 14px;
border-radius:999px;
font-weight:800;
font-size:13px;
border:2px solid rgba(78,8,12,.10);
white-space:nowrap;
}

.card{
background:#fff;
border-radius:30px;
padding:20px;
box-shadow:var(--shadow);
margin-bottom:18px;
}

h1,h2,h3{
font-family:"Baloo 2", cursive;
margin:0 0 8px;
line-height:.98;
}

h1{font-size:42px}
h2{font-size:32px}

p{
margin:0;
color:var(--muted);
font-weight:600;
line-height:1.5;
font-size:15px;
}

.kicker{
display:inline-flex;
align-items:center;
justify-content:center;
padding:8px 14px;
border-radius:999px;
background:var(--yellow);
color:var(--burgundy);
font-size:13px;
font-weight:800;
margin-bottom:12px;
}

.btn{
width:100%;
padding:16px;
border-radius:22px;
border:none;
font-weight:800;
font-size:16px;
margin-top:10px;
cursor:pointer;
transition:.18s ease;
font-family:Inter,sans-serif;
}

.btn-orange{background:var(--orange);color:#fff}
.btn-green{background:#25D366;color:#fff}
.btn-outline{border:2px solid var(--green);background:#fff;color:var(--green)}

.story-shell{
background:#fff;
border-radius:30px;
padding:16px;
box-shadow:var(--shadow-soft);
margin-top:14px;
}

.story-card{
width:100%;
aspect-ratio:9/16;
border-radius:38px;
overflow:hidden;
position:relative;
padding:20px;
border:2px solid rgba(0,0,0,.05);
box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
}

.story-inner{
height:100%;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.story-top{
display:flex;
justify-content:space-between;
}

.story-logo{
width:48px;
height:48px;
border-radius:16px;
background:var(--orange);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:800;
}

.story-pill{
padding:10px 14px;
border-radius:999px;
font-weight:800;
font-size:14px;
background:#fff;
}

.story-middle{
display:grid;
gap:6px;
}

.story-emoji{
font-size:60px;
}

.story-name{
font-family:"Baloo 2", cursive;
font-size:60px;
line-height:.8;
}

.story-role{
font-size:28px;
font-weight:800;
}

.story-bottom{
display:grid;
gap:8px;
}

.story-vote-badge{
background:#dff0e7;
color:var(--green);
padding:10px 14px;
border-radius:999px;
font-weight:800;
}

.bar-wrap{
background:#eee;
border-radius:999px;
height:10px;
overflow:hidden;
}

.bar-fill{
height:100%;
background:var(--green);
}

.bar-meta{
font-size:13px;
font-weight:700;
}

.summary-grid{
display:grid;
gap:10px;
margin-top:10px;
}

.summary-item{
padding:14px;
border-radius:20px;
background:#fff;
box-shadow:var(--shadow-soft);
}

.summary-item .label{
font-weight:800;
}

.summary-item .meta{
margin-top:6px;
font-size:13px;
}

</style>
</head>

<body>

<div class="shell">

<div class="top">
<div class="top-left">
<div class="logo">⚖</div>

<div>
<div class="brand-title">ElVeredicto</div>
<div class="brand-sub">Resultado</div>
</div>

</div>

<div class="badge">Self</div>
</div>

<div class="card">

<div class="kicker">resultado</div>

<h1 id="title">
Tus resultados
</h1>

<p>
Mirá qué respondió la gente sobre vos.
</p>

</div>


<div class="card">

<h2>Resultado viral</h2>

<div class="story-shell">

<div class="story-card" id="viralCard">

<div class="story-inner">

<div class="story-top">
<div class="story-logo">⚖</div>
<div class="story-pill">sin filtro</div>
</div>

<div class="story-middle">

<div class="story-emoji">🔥</div>

<div class="story-name" id="name">
MATIAS
</div>

<div class="story-role" id="question">
¿tiene más levante?
</div>

</div>

<div class="story-bottom">

<div class="story-vote-badge" id="percent">
83% dijo que sí
</div>

<div>
<div class="bar-wrap">
<div class="bar-fill" id="bar"></div>
</div>

<div class="bar-meta" id="meta">
Sí 83% · No 17%
</div>
</div>

<div style="font-size:12px;font-weight:800;">
elveredicto.app
</div>

</div>

</div>

</div>

</div>

<button class="btn btn-orange" id="shareBtn">
Subir resultado
</button>

<button class="btn btn-outline" id="downloadBtn">
Guardar imagen
</button>

</div>


<div class="card">

<h2>Todas las preguntas</h2>

<div class="summary-grid" id="summary">
</div>

</div>

</div>


<script>

const SUPABASE_URL = "https://ytupmzjhhulcwfuidkzc.supabase.co";
const SUPABASE_KEY = "sb_publishable_rKhLyK7Ir9hrh_1aQZxrcg_Sjn-E15g";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function getCode(){
return new URLSearchParams(location.search).get("code");
}

function applyName(text,name){
return text.replaceAll("{nombre}",name);
}

function stats(votes,id){

const vs=votes.filter(v=>v.pregunta_id===id);

const yes=vs.filter(v=>v.respuesta==="si").length;
const no=vs.filter(v=>v.respuesta==="no").length;

const total=yes+no;

const yesPct=total?Math.round(yes/total*100):0;

return{
yes,
no,
total,
yesPct,
noPct:100-yesPct
};

}

async function load(){

const code=getCode();

if(!code)return;

const {data:veredicto}=await db
.from("veredictos")
.select("*")
.eq("code",code)
.single();

const {data:rel}=await db
.from("veredicto_preguntas")
.select("pregunta_id,preguntas(texto),orden")
.eq("veredicto_id",veredicto.id)
.order("orden",{ascending:true});

const preguntas=rel.map(p=>({
id:p.pregunta_id,
texto:p.preguntas.texto
}));

const {data:votos}=await db
.from("votos")
.select("*")
.eq("veredicto_id",veredicto.id);

document.getElementById("name").textContent=(veredicto.nickname||"ALGUIEN").toUpperCase();

let best=null;

preguntas.forEach(q=>{

const s=stats(votos,q.id);

if(!best||s.yesPct>best.yesPct){

best={
...q,
...s
};

}

});

if(best){

const txt=applyName(best.texto,veredicto.nickname);

document.getElementById("question").textContent=txt;

document.getElementById("percent").textContent=
best.yesPct+"% dijo que sí";

document.getElementById("bar").style.width=
best.yesPct+"%";

document.getElementById("meta").textContent=
"Sí "+best.yesPct+"% · No "+best.noPct+"%";

}

const grid=document.getElementById("summary");

preguntas.forEach(q=>{

const s=stats(votos,q.id);

const item=document.createElement("div");

item.className="summary-item";

item.innerHTML=`
<div class="label">
${applyName(q.texto,veredicto.nickname)}
</div>

<div class="bar-wrap">
<div class="bar-fill" style="width:${s.yesPct}%"></div>
</div>

<div class="meta">
Sí ${s.yesPct}% · No ${s.noPct}% · ${s.total} respuestas
</div>
`;

grid.appendChild(item);

});

}

load();

</script>

</body>
</html>
