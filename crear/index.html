<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crear veredicto — ElVeredicto</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
background:#FCF3EC;
font-family:Inter;
padding:24px 14px;
}

.shell{
max-width:560px;
margin:auto;
}

.card{
background:white;
padding:22px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
margin-bottom:18px;
}

h1{
font-family:"Baloo 2";
font-size:40px;
margin:0 0 10px;
}

p{
color:#666;
font-size:15px;
margin-bottom:20px;
}

label{
font-weight:700;
font-size:13px;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:16px;
border-radius:18px;
border:2px solid rgba(0,0,0,.1);
margin-bottom:16px;
font-size:15px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:22px;
font-weight:700;
font-size:16px;
cursor:pointer;
}

.primary{
background:#FF5E29;
color:white;
}

.participants{
display:flex;
gap:10px;
margin-bottom:10px;
}

.participants input{
flex:1;
margin:0;
}

.participants button{
width:auto;
padding:12px 16px;
background:#00804A;
color:white;
}

.list{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:16px;
}

.chip{
background:#fff;
border:2px solid rgba(0,0,0,.1);
padding:8px 12px;
border-radius:100px;
font-weight:700;
font-size:14px;
}

.hidden{
display:none;
}

</style>

</head>
<body>

<div class="shell">

<div class="card">

<h1 id="title"></h1>

<p id="subtitle"></p>


<div id="selfBlock">

<label>Tu nombre o apodo</label>

<input id="nickname" placeholder="Ej: Matias">

</div>


<div id="groupBlock">

<label>Nombre del grupo</label>

<input id="groupName" placeholder="Ej: Los del club">

<label>Participantes</label>

<div class="participants">

<input id="participantInput" placeholder="Nombre">

<button id="addBtn">Agregar</button>

</div>

<div id="list" class="list"></div>

</div>


<label>Categoría</label>

<div id="categories"></div>


<button id="verPreguntas" class="primary">
Ver preguntas
</button>

</div>


<div id="questionsCard" class="card hidden">

<h1>Tus preguntas</h1>

<div id="questions"></div>

<button id="confirmar">
Usar estas preguntas
</button>

</div>


<div id="shareCard" class="card hidden">

<h1>Listo para compartir</h1>

<input id="link" readonly>

<button id="copy">
Copiar link
</button>

</div>

</div>

<script>

const SUPABASE_URL="https://ytupmzjhhulcwfuidkzc.supabase.co";
const SUPABASE_KEY="sb_publishable_rKhLyK7Ir9hrh_1aQZxrcg_Sjn-E15g";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const params=new URLSearchParams(location.search);

const mode=params.get("mode")||"self";

const title=document.getElementById("title");
const subtitle=document.getElementById("subtitle");

const selfBlock=document.getElementById("selfBlock");
const groupBlock=document.getElementById("groupBlock");

if(mode==="group"){

title.innerText="Armá el veredicto del grupo";

subtitle.innerText="Agregá nombres y descubrí quién es quién.";

selfBlock.style.display="none";

}else{

title.innerText="Creá tu veredicto";

subtitle.innerText="Mandá el link y descubrí qué piensa la gente.";

groupBlock.style.display="none";

}

let participants=[];

const input=document.getElementById("participantInput");

document.getElementById("addBtn").onclick=()=>{

const name=input.value.trim();

if(!name)return;

participants.push(name);

render();

input.value="";

};

function render(){

const list=document.getElementById("list");

list.innerHTML="";

participants.forEach(n=>{

const chip=document.createElement("div");

chip.className="chip";

chip.innerText=n;

list.appendChild(chip);

});

}

</script>

</body>
</html>
