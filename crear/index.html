<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear veredicto — ElVeredicto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#FCF3EC; --text:#000; --orange:#FF5E29; --green:#00804A; --pink:#FFB6EF;
      --burgundy:#4E080C; --white:#fff; --line:rgba(0,0,0,.12);
      --shadow:0 18px 50px rgba(0,0,0,.08); --radius:30px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:24px 14px 40px; min-height:100vh; font-family:Inter,sans-serif; color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(255,182,239,.45), transparent 26%),
        radial-gradient(circle at bottom left, rgba(255,209,46,.28), transparent 24%),
        var(--bg);
    }
    .hidden{display:none!important}
    .shell{max-width:560px;margin:0 auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:54px;height:54px;border-radius:20px;background:var(--orange);color:#fff;
      display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;box-shadow:var(--shadow)
    }
    .brand-title{font-family:"Baloo 2",cursive;font-size:28px;line-height:1;font-weight:800}
    .brand-sub{color:rgba(0,0,0,.58);font-size:13px;font-weight:700;margin-top:2px}
    .beta{
      background:var(--pink);color:var(--burgundy);border:2px solid rgba(78,8,12,.15);
      border-radius:999px;padding:9px 14px;font-weight:800;font-size:13px
    }
    .card{
      background:
        radial-gradient(circle at top right, rgba(255,182,239,.55), transparent 34%),
        radial-gradient(circle at bottom left, rgba(255,209,46,.30), transparent 28%),
        var(--white);
      border:2px solid rgba(0,0,0,.06);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:22px;margin-bottom:16px
    }
    h1,h2{font-family:"Baloo 2",cursive;margin:0 0 8px;line-height:1}
    h1{font-size:42px} h2{font-size:34px}
    p,.help{color:rgba(0,0,0,.68);font-size:15px;line-height:1.55;margin:0 0 18px;font-weight:600}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:13px;font-weight:800;margin-bottom:8px}
    input,textarea{
      width:100%;border:2px solid var(--line);background:#fff;border-radius:20px;padding:16px;
      font-size:15px;color:var(--text);outline:none;font-family:Inter,sans-serif
    }
    .categories{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .category-btn{
      padding:16px;border-radius:24px;font-weight:800;text-align:center;cursor:pointer;border:2px solid transparent;
      min-height:64px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;background:#fff
    }
    .category-btn.active{border-color:var(--orange);box-shadow:0 10px 22px rgba(255,94,41,.22)}
    .category-btn.amigos{background:#DFF4E9;color:#0B6B43}
    .category-btn.familia{background:#FFF3B8;color:#7B4B00}
    .category-btn.pareja{background:#FFDDF4;color:#7C1E4D}
    .category-btn.picante{background:#FFE1D7;color:#8B2E16}
    .participants-input{display:flex;gap:10px;align-items:center}
    .participants-input input{flex:1}
    .participants-input button{
      min-width:110px;padding:14px 16px;border:none;border-radius:18px;background:var(--green);
      color:#fff;font-weight:800;cursor:pointer;font-family:Inter,sans-serif
    }
    .participants-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .participant-chip{
      display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#fff;
      border:2px solid rgba(0,0,0,.08);font-weight:800;font-size:14px
    }
    .participant-chip button{border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:800;color:#7a7a7a;padding:0}
    .btn{
      width:100%;border:none;border-radius:22px;padding:16px 18px;font-size:15px;font-weight:800;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;font-family:Inter,sans-serif
    }
    .btn-primary{background:var(--orange);color:#fff}
    .btn-dark{background:var(--burgundy);color:#fff;margin-top:10px}
    .btn-outline{width:auto;background:#fff;color:var(--green);border:2px solid var(--green);padding:12px 18px}
    .btn-whatsapp{background:#25D366;color:#fff;margin-top:12px}
    .row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:10px}
    .questions{display:grid;gap:12px;margin-bottom:16px}
    .question{
      border-radius:24px;padding:16px;font-weight:800;font-size:15px;line-height:1.4;border:2px solid rgba(0,0,0,.06)
    }
    .question:nth-child(1){background:#FFF1D0}
    .question:nth-child(2){background:#FFD8F5}
    .question:nth-child(3){background:#D8F3E6}
    .question:nth-child(4){background:#FFE1D7}
    .question:nth-child(5){background:#FFF4B8}
    .link-box{display:flex;gap:10px;align-items:center}
    .link-box input{flex:1}
    .copy-card{margin-top:14px;background:#fff8f4;border:2px solid rgba(0,0,0,.06);border-radius:24px;padding:14px}
    .copy-title{font-size:13px;font-weight:800;margin-bottom:10px}
    textarea{min-height:110px;resize:none;margin-bottom:10px;line-height:1.5}
    .error{
      margin-top:14px;background:#ffe5e0;color:#912f18;border:2px solid rgba(145,47,24,.12);
      border-radius:20px;padding:14px;font-size:14px;font-weight:800
    }
    @media (max-width:640px){
      h1{font-size:36px} h2{font-size:30px}
      .categories{grid-template-columns:1fr}
      .participants-input{flex-direction:column}
      .participants-input button,.link-box,.row{width:100%}
      .row{flex-direction:column}
      .link-box{flex-direction:column}
      .link-box .btn-outline,.row .btn-outline{width:100%}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="brand">
        <div class="logo">⚖</div>
        <div>
          <div class="brand-title">ElVeredicto</div>
          <div class="brand-sub" id="brandSub">Creá tu juego social</div>
        </div>
      </div>
      <div class="beta">Beta</div>
    </div>

    <div class="card">
      <h1 id="pageTitle">Creá tu veredicto</h1>
      <p id="pageSubtitle">Elegí categoría, prepará el juego y compartilo.</p>

      <div id="selfBlock">
        <div class="field">
          <label for="nickname">Tu nombre o apodo</label>
          <input id="nickname" placeholder="Ej: Matias">
        </div>
      </div>

      <div id="groupBlock" class="hidden">
        <div class="field">
          <label for="groupName">Nombre del grupo</label>
          <input id="groupName" placeholder="Ej: Los del club">
        </div>

        <div class="field">
          <label for="participantInput">Participantes</label>
          <div class="participants-input">
            <input id="participantInput" placeholder="Nombre de participante">
            <button id="addParticipantBtn" type="button">Agregar</button>
          </div>
          <div id="participantsList" class="participants-list"></div>
        </div>
      </div>

      <div class="field">
        <label>Elegí categoría</label>
        <div id="categoriesContainer" class="categories"></div>
      </div>

      <button id="loadQuestionsBtn" class="btn btn-primary" type="button">Ver preguntas</button>
      <div id="errorBox" class="error hidden"></div>
    </div>

    <div id="questionsCard" class="card hidden">
      <div class="row">
        <h2>Tus preguntas</h2>
        <button id="refreshQuestionsBtn" class="btn btn-outline" type="button">Actualizar</button>
      </div>

      <p class="help" id="questionsHelp"></p>
      <div id="questionsList" class="questions"></div>
      <button id="confirmVerdictBtn" class="btn btn-dark" type="button">Usar estas preguntas</button>
    </div>

    <div id="shareCard" class="card hidden">
      <h2>Listo para compartir</h2>

      <div class="link-box">
        <input id="linkInput" readonly>
        <button id="copyLinkBtn" class="btn btn-outline" type="button">Copiar</button>
      </div>

      <a id="waBtn" class="btn btn-whatsapp" target="_blank" rel="noopener noreferrer">Compartir por WhatsApp</a>

      <div class="copy-card">
        <div class="copy-title">Mensaje sugerido</div>
        <textarea id="shareText" readonly></textarea>
        <button id="copyTextBtn" class="btn btn-outline" type="button">Copiar mensaje</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ytupmzjhhulcwfuidkzc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_rKhLyK7Ir9hrh_1aQZxrcg_Sjn-E15g";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") === "group" ? "group" : "self";

    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const brandSub = document.getElementById("brandSub");

    const selfBlock = document.getElementById("selfBlock");
    const groupBlock = document.getElementById("groupBlock");

    const nicknameInput = document.getElementById("nickname");
    const groupNameInput = document.getElementById("groupName");
    const participantInput = document.getElementById("participantInput");
    const addParticipantBtn = document.getElementById("addParticipantBtn");
    const participantsList = document.getElementById("participantsList");

    const categoriesContainer = document.getElementById("categoriesContainer");
    const loadQuestionsBtn = document.getElementById("loadQuestionsBtn");
    const refreshQuestionsBtn = document.getElementById("refreshQuestionsBtn");
    const confirmVerdictBtn = document.getElementById("confirmVerdictBtn");

    const questionsCard = document.getElementById("questionsCard");
    const questionsList = document.getElementById("questionsList");
    const questionsHelp = document.getElementById("questionsHelp");

    const shareCard = document.getElementById("shareCard");
    const errorBox = document.getElementById("errorBox");
    const linkInput = document.getElementById("linkInput");
    const copyLinkBtn = document.getElementById("copyLinkBtn");
    const waBtn = document.getElementById("waBtn");
    const shareText = document.getElementById("shareText");
    const copyTextBtn = document.getElementById("copyTextBtn");

    let selectedCategory = null;
    let currentQuestions = [];
    let participants = [];

    function show(el){ el.classList.remove("hidden"); }
    function hide(el){ el.classList.add("hidden"); }

    function showError(message){
      errorBox.textContent = message;
      show(errorBox);
    }

    function hideError(){
      errorBox.textContent = "";
      hide(errorBox);
    }

    function setupMode(){
      if(mode === "group"){
        pageTitle.textContent = "Armá el veredicto del grupo";
        pageSubtitle.textContent = "Agregá nombres y descubrí quién es quién.";
        brandSub.textContent = "Veredicto del grupo";
        hide(selfBlock);
        show(groupBlock);
        questionsHelp.textContent = "Estas son las 5 preguntas que verá el grupo para votar entre los participantes.";
      } else {
        pageTitle.textContent = "Creá tu veredicto";
        pageSubtitle.textContent = "Mandá tu link y descubrí qué piensa la gente sobre vos.";
        brandSub.textContent = "Qué opinan sobre mí";
        show(selfBlock);
        hide(groupBlock);
        questionsHelp.textContent = "Estas son las 5 preguntas que responderán sobre vos.";
      }
    }

    function renderParticipants(){
      participantsList.innerHTML = "";
      participants.forEach((name, index) => {
        const chip = document.createElement("div");
        chip.className = "participant-chip";
        chip.innerHTML = '<span>' + name + '</span><button type="button">✕</button>';
        chip.querySelector("button").addEventListener("click", function(){
          participants.splice(index, 1);
          renderParticipants();
        });
        participantsList.appendChild(chip);
      });
    }

    function addParticipant(){
      const name = participantInput.value.trim();
      if(!name) return;
      if(participants.length >= 10){
        showError("Podés agregar hasta 10 participantes.");
        return;
      }
      participants.push(name);
      participantInput.value = "";
      hideError();
      renderParticipants();
    }

    function renderQuestions(questions){
      questionsList.innerHTML = "";
      questions.forEach((q, index) => {
        const item = document.createElement("div");
        item.className = "question";
        item.innerHTML = "<strong>" + (index + 1) + ".</strong> " + q.texto;
        questionsList.appendChild(item);
      });
    }

    async function loadCategories(){
      hideError();
      const result = await db
        .from("categorias")
        .select("id,nombre,slug")
        .eq("activa", true)
        .order("nombre", { ascending: true });

      if(result.error){
        console.error(result.error);
        showError("No se pudieron cargar las categorías.");
        return;
      }

      const icons = {
        amigos: "😎",
        familia: "👨‍👩‍👧",
        pareja: "💘",
        picante: "🔥"
      };

      categoriesContainer.innerHTML = "";

      (result.data || []).forEach(function(cat){
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "category-btn " + cat.slug;
        btn.innerHTML = (icons[cat.slug] || "⭐") + " <span>" + cat.nombre + "</span>";

        btn.addEventListener("click", function(){
          document.querySelectorAll(".category-btn").forEach(function(el){
            el.classList.remove("active");
          });
          btn.classList.add("active");
          selectedCategory = cat.id;
          hide(questionsCard);
          hide(shareCard);
        });

        categoriesContainer.appendChild(btn);
      });
    }

    async function fetchRandomQuestions(){
      hideError();

      if(!selectedCategory){
        showError("Elegí una categoría para continuar.");
        return;
      }

      if(mode === "group" && participants.length < 3){
        showError("Para el modo grupo agregá al menos 3 participantes.");
        return;
      }

      const result = await db
        .from("preguntas")
        .select("id,texto")
        .eq("categoria_id", selectedCategory)
        .eq("activa", true);

      if(result.error){
        console.error(result.error);
        showError("No se pudieron cargar las preguntas.");
        return;
      }

      if(!result.data || result.data.length < 5){
        showError("Esta categoría todavía no tiene suficientes preguntas.");
        return;
      }

      currentQuestions = result.data.slice().sort(function(){ return Math.random() - 0.5; }).slice(0,5);
      renderQuestions(currentQuestions);
      show(questionsCard);
      hide(shareCard);
      questionsCard.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function generateCode(length){
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for(let i=0;i<length;i++){
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }

    function buildShareMessage(link, nickname, groupName){
      if(mode === "group"){
        return "🔥 Armé el veredicto del grupo" + (groupName ? " " + groupName : "") + "\n\nEntren y voten quién es quién 😂👇\n" + link;
      }
      return "⚖️ Hacé mi veredicto anónimo\n\nEntrá y respondé estas 5 preguntas sobre " + nickname + " 👇\n" + link;
    }

    async function createVerdict(){
      hideError();

      const nickname = nicknameInput ? nicknameInput.value.trim() : "";
      const groupName = groupNameInput ? groupNameInput.value.trim() : "";

      if(mode === "self"){
        if(!nickname){
          showError("Escribí tu nombre o apodo.");
          return;
        }
        if(nickname.length < 2){
          showError("Poné al menos 2 caracteres.");
          return;
        }
      }

      if(mode === "group"){
        if(!groupName){
          showError("Escribí el nombre del grupo.");
          return;
        }
        if(participants.length < 3){
          showError("Para el modo grupo necesitás al menos 3 participantes.");
          return;
        }
      }

      if(!selectedCategory){
        showError("Elegí una categoría.");
        return;
      }

      if(currentQuestions.length !== 5){
        showError("Primero elegí una tanda de preguntas.");
        return;
      }

      confirmVerdictBtn.disabled = true;
      confirmVerdictBtn.textContent = "Creando...";

      const code = generateCode(6);
      const expires = new Date();
      expires.setHours(expires.getHours() + 24);

      const verdictResult = await db
        .from("veredictos")
        .insert([{
          code: code,
          nickname: mode === "self" ? nickname : groupName,
          expires_at: expires.toISOString(),
          categoria_id: Number(selectedCategory),
          mode: mode,
          group_name: mode === "group" ? groupName : null
        }])
        .select("id")
        .single();

      if(verdictResult.error){
        console.error(verdictResult.error);
        confirmVerdictBtn.disabled = false;
        confirmVerdictBtn.textContent = "Usar estas preguntas";
        showError("No se pudo crear el veredicto.");
        return;
      }

      const verdictId = verdictResult.data.id;

      if(mode === "group"){
        const participantRows = participants.map(function(name, index){
          return {
            veredicto_id: verdictId,
            nombre: name,
            orden: index + 1
          };
        });

        const participantsResult = await db.from("participantes").insert(participantRows);

        if(participantsResult.error){
          console.error(participantsResult.error);
          confirmVerdictBtn.disabled = false;
          confirmVerdictBtn.textContent = "Usar estas preguntas";
          showError("El veredicto se creó, pero falló al guardar los participantes.");
          return;
        }
      }

      const relationRows = currentQuestions.map(function(q, index){
        return {
          veredicto_id: verdictId,
          pregunta_id: q.id,
          orden: index + 1
        };
      });

      const relationResult = await db.from("veredicto_preguntas").insert(relationRows);

      confirmVerdictBtn.disabled = false;
      confirmVerdictBtn.textContent = "Usar estas preguntas";

      if(relationResult.error){
        console.error(relationResult.error);
        showError("El veredicto se creó, pero falló al guardar las preguntas.");
        return;
      }

      const link = window.location.origin + "/votar?code=" + code;
      const message = buildShareMessage(link, nickname, groupName);

      linkInput.value = link;
      shareText.value = message;
      waBtn.href = "https://wa.me/?text=" + encodeURIComponent(message);

      show(shareCard);
      shareCard.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    if(addParticipantBtn){
      addParticipantBtn.addEventListener("click", addParticipant);
    }

    if(participantInput){
      participantInput.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
          e.preventDefault();
          addParticipant();
        }
      });
    }

    loadQuestionsBtn.addEventListener("click", fetchRandomQuestions);
    refreshQuestionsBtn.addEventListener("click", fetchRandomQuestions);
    confirmVerdictBtn.addEventListener("click", createVerdict);

    copyLinkBtn.addEventListener("click", async function(){
      try{
        await navigator.clipboard.writeText(linkInput.value);
        copyLinkBtn.textContent = "Copiado ✅";
        setTimeout(function(){ copyLinkBtn.textContent = "Copiar"; }, 1400);
      } catch(err){
        showError("No se pudo copiar el link.");
      }
    });

    copyTextBtn.addEventListener("click", async function(){
      try{
        await navigator.clipboard.writeText(shareText.value);
        copyTextBtn.textContent = "Mensaje copiado ✅";
        setTimeout(function(){ copyTextBtn.textContent = "Copiar mensaje"; }, 1400);
      } catch(err){
        showError("No se pudo copiar el mensaje.");
      }
    });

    setupMode();
    loadCategories();
  </script>
</body>
</html>
